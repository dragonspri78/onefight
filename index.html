<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>One Piece Fighting Game</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #f0f0f0;\n            text-align: center;\n        }\n        .game-container {\n            background-color: #ffffff;\n            border: 1px solid #ddd;\n            padding: 20px;\n            border-radius: 10px;\n            display: inline-block;\n            margin-top: 50px;\n        }\n        h1 {\n            color: #333;\n        }\n        .character {\n            margin: 10px;\n            padding: 10px;\n            border: 1px solid #ccc;\n            border-radius: 5px;\n        }\n        .button {\n            padding: 10px 20px;\n            background-color: #28a745;\n            color: white;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n        }\n    </style>\n</head>\n<body>\n    <div class="game-container">\n        <h1>One Piece Fighting Game</h1>\n        <div class="character">\n            <h2>Character 1: Monkey D. Luffy</h2>\n            <button class="button">Select</button>\n        </div>\n        <div class="character">\n            <h2>Character 2: Roronoa Zoro</h2>\n            <button class="button">Select</button>\n        </div>\n        <div class="character">\n            <h2>Character 3: Nami</h2>\n            <button class="button">Select</button>\n        </div>\n    </div>\n</body>\n</html>
